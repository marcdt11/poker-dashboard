<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2128;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-green: #3fb950;
            --accent-blue: #58a6ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }
        .container {
            text-align: center;
            padding: 32px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        p {
            color: var(--text-secondary);
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        a {
            display: block;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px 40px;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 600;
            transition: border-color 0.2s, transform 0.2s;
            min-width: 200px;
        }
        a:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }
        a span {
            display: block;
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-secondary);
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Poker Tools</h1>
        <p>Study and analysis tools for NLHE</p>
        <div class="links">
            <a href="/dashboard/">Dashboard<span>Analytics &amp; tracking</span></a>
            <a href="/driller/">RTP Driller<span>Scenario drilling</span></a>
        </div>
    </div>
</body>
</html>
